<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi indigo→violet -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Corps du téléphone (blanc) -->
  <rect x="16" y="7" width="32" height="50" rx="6" fill="white"/>

  <!-- Écran (indigo foncé) -->
  <rect x="20" y="14" width="24" height="34" rx="3" fill="#3730a3"/>

  <!-- Encoche haut -->
  <rect x="25" y="10" width="14" height="2.5" rx="1.25" fill="#c7d2fe"/>

  <!-- Indicateur bas (home) -->
  <rect x="26" y="51" width="12" height="2.5" rx="1.25" fill="#c7d2fe"/>

  <!-- Éclair — transfert instantané -->
  <path d="M36 16 L26 33 H33 L28 48 L43 29 H36 Z" fill="url(#bolt)"/>
</svg>
